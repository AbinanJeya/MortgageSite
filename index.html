<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AskJuthis | Expert Guidance for Your Home Journey</title>
    <meta name="description"
        content="AskJuthis provides expert mortgage guidance, competitive rates, and personalized financing solutions for first-time buyers, refinancing, and more.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0F1E2E',
                            gold: '#D3BD73',
                            slate: '#4A5D73',
                            warm: '#F4F1EE'
                        },
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#3a485a",
                        "tertiary-fixed-dim": "#b4c8e2",
                        "outline": "#74777d",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#dcc57a",
                        "background": "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "inverse-primary": "#b9c8dd",
                        "primary": "#0F1E2E",
                        "on-primary-fixed": "#0d1c2c",
                        "surface": "#f8f9fa",
                        "on-tertiary-container": "#73879e",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary-container": "#091e31",
                        "on-surface-variant": "#44474c",
                        "on-primary-container": "#78869a",
                        "surface-dim": "#d9dadb",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed": "#D3BD73",
                        "error": "#ba1a1a",
                        "surface-tint": "#516072",
                        "on-tertiary-fixed": "#071d30",
                        "primary-container": "#4A5D73",
                        "on-secondary-container": "#726121",
                        "on-tertiary-fixed-variant": "#35485d",
                        "on-error": "#ffffff",
                        "secondary": "#6e5d1d",
                        "outline-variant": "#c4c6cc",
                        "primary-fixed-dim": "#b9c8dd",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-primary": "#ffffff",
                        "on-background": "#191c1d",
                        "secondary-container": "#f6df91",
                        "inverse-on-surface": "#f0f1f2",
                        "primary-fixed": "#d5e4fa",
                        "on-secondary-fixed": "#231b00",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "tertiary": "#000308",
                        "on-secondary-fixed-variant": "#554505"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "sans": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                }
            }
        }
    </script>




    <!-- Fonts: Manrope, Inter & Pinyon Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- CSS (for custom transitions) -->
    <link rel="stylesheet" href="style.css?v=1.0.5">

    <!-- Calendly Widget Script -->
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
</head>

<body class="font-sans text-white bg-brand-slate">
    <!-- Top Bar (Live Rates) -->
    <div id="top-bar-container"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-brand-navy/95 border-b border-white/10">
        <div class="px-4 sm:px-8 lg:px-12">
            <div class="grid grid-cols-2 lg:grid-cols-3 h-20 items-center">
                <!-- Left: Logo -->
                <div class="flex items-center">
                    <span class="text-2xl font-bold tracking-tight text-white uppercase"
                        id="brand-logo-container"></span>
                </div>

                <!-- Center: Links (Desktop Only) -->
                <div class="hidden lg:flex justify-center space-x-8 items-center" id="nav-links-container"></div>

                <!-- Right: CTA (Desktop Only) -->
                <div class="hidden lg:flex justify-end items-center space-x-4" id="nav-cta-container"></div>

                <!-- Mobile Toggle (Right aligned on mobile) -->
                <div class="lg:hidden flex justify-end">
                    <button class="p-2 text-white" onclick="toggleMobileMenu()" aria-label="Open menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16m-7 6h7" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay & Panel -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[60]">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-brand-navy/60 " onclick="toggleMobileMenu()"></div>
        <!-- Sidebar -->
        <div
            class="fixed right-0 top-0 h-full w-72 bg-brand-navy/60  shadow-2xl transition-transform duration-300 transform border-l border-white/20">
            <div class="p-6">
                <div class="flex items-center justify-between mb-8">
                    <span class="text-xl font-bold text-white uppercase">Menu</span>
                    <button class="p-2 -mr-2 text-white" onclick="toggleMobileMenu()" aria-label="Close menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex flex-col space-y-6" id="mobile-links-container">
                    <!-- Injected via main.js -->
                </div>
            </div>
        </div>
    </div>


    <!-- Dynamic Content Injection Point -->
    <main id="app-content">
        <!-- Hero, Services, Why Us, Booking, Testimonials, Contact, Footer will be injected here -->
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="config.js"></script>
    <script src="main.js?v=1.0.3"></script>
</body>

</html>
