<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AskJuthis | Expert Guidance for Your Home Journey</title>
    <meta name="description" content="AskJuthis provides expert mortgage guidance, competitive rates, and personalized financing solutions for first-time buyers, refinancing, and more.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0F1E2E',
                            gold: '#D3BD73',
                            slate: '#4A5D73',
                            warm: '#F4F1EE'
                        }
                    },
                    fontFamily: {
                        sans: ['Antipasto Pro', 'system-ui', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif'],
                        spaceGrotesk: ['Space Grotesk', 'sans-serif'],
                        script: ['Denita Script', 'cursive']
                    }
                }
            }
        }
    </script>

    <!-- Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Fonts loaded locally via @font-face in style.css -->

    <!-- CSS (for custom transitions) -->
    <link rel="stylesheet" href="style.css?v=1.0.5">

    <!-- Calendly Widget Script -->
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
</head>

<body class="font-sans text-white bg-brand-slate">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-brand-navy/95 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-bold tracking-tight text-white uppercase" id="brand-logo-container">
                        <!-- Injected via main.js -->
                    </span>
                </div>
                <div class="hidden lg:flex space-x-8 items-center" id="nav-links-container">
                    <!-- Injected via main.js -->
                </div>
                <div class="lg:hidden">
                    <button class="p-2 text-white" onclick="toggleMobileMenu()" aria-label="Open menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16m-7 6h7" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay & Panel -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-[60]">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-brand-navy/60 backdrop-blur-md" onclick="toggleMobileMenu()"></div>
        <!-- Sidebar -->
        <div
            class="fixed right-0 top-0 h-full w-72 bg-brand-navy/60 backdrop-blur-3xl shadow-2xl transition-transform duration-300 transform border-l border-white/20">
            <div class="p-6">
                <div class="flex items-center justify-between mb-8">
                    <span class="text-xl font-bold text-white uppercase">Menu</span>
                    <button class="p-2 -mr-2 text-white" onclick="toggleMobileMenu()" aria-label="Close menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex flex-col space-y-6" id="mobile-links-container">
                    <!-- Injected via main.js -->
                </div>
            </div>
        </div>
    </div>


    <!-- Dynamic Content Injection Point -->
    <main id="app-content">
        <!-- Hero, Services, Why Us, Booking, Testimonials, Contact, Footer will be injected here -->
    </main>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="main.js?v=1.0.3"></script>
</body>

</html>
